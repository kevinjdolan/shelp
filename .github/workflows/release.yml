name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, for example 0.2.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Ensure release tag does not already exist
        run: |
          if git rev-parse "v${{ github.event.inputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ github.event.inputs.version }} already exists." >&2
            exit 1
          fi

      - name: Bump version
        run: uv run python scripts/bump_version.py "${{ github.event.inputs.version }}"

      - name: Run tests
        run: uv run pytest

      - name: Build distributions
        run: uv build --out-dir dist

      - name: Commit version bump
        run: |
          git add pyproject.toml src/shelp/__init__.py
          git commit -m "Release v${{ github.event.inputs.version }}"

      - name: Create tag
        run: git tag "v${{ github.event.inputs.version }}"

      - name: Push commit and tag
        run: git push origin HEAD --follow-tags

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          generate_release_notes: true
          files: |
            dist/*
